# Render Blueprint — https://render.com/docs/blueprint-spec
# After first deploy, set AUTH_SECRET in the Render dashboard (Environment).
services:
  - type: web
    name: navig8r-api
    runtime: docker
    region: singapore
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    disk:
      name: navig8r-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: OTP_DEBUG
        value: "0"
      # Must be set manually in dashboard (do not commit secrets):
      # AUTH_SECRET = openssl rand -hex 32
      - key: AUTH_SECRET
        sync: false
      # Persist JSON store across deploys (attach a Render Disk mounted at /data):
      - key: DATA_FILE
        value: /data/store.json
      # Carrier payout settlement mode:
      #   BOOKKEEPING (default) = mark ledger PAID only, no money moves (MVP).
      #   RAZORPAYX             = real RazorpayX payouts per carrier (test keys in dev).
      - key: PAYOUTS_MODE
        value: BOOKKEEPING
      # Required only when PAYOUTS_MODE=RAZORPAYX. Reuses RAZORPAY_KEY_ID/SECRET below.
      # RAZORPAYX_ACCOUNT_NUMBER = the RazorpayX source/virtual account number (dashboard).
      - key: RAZORPAYX_ACCOUNT_NUMBER
        sync: false
      # Optional payout rail: IMPS (default) | NEFT | RTGS | UPI.
      - key: RAZORPAYX_PAYOUT_MODE
        value: IMPS
      # Razorpay test keys (set in dashboard; required for customer payments and RAZORPAYX payouts):
      - key: PAYMENT_PROVIDER
        value: RAZORPAY
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # Customer web (Flutter static site). After first deploy, set CORS_ALLOWED_ORIGINS on
  # navig8r-api to this site's https URL (comma-separated if multiple).
  - type: web
    name: navig8r-customer-web
    runtime: static
    region: singapore
    branch: main
    buildCommand: bash scripts/render-build-customer-web.sh
    staticPublishPath: apps/driver_pilot/build/web
    envVars:
      - key: API_BASE_URL
        value: https://navig8r.onrender.com
      - key: FLUTTER_VERSION
        value: "3.22.3"
